<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Envelope + Letter (Open/Close on Click)</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="letter">
                    <div class="text">
                        <h1 id="main-text">Merhaba çok tatlısınız. Tanışabilir miyiz?</h1>
                    </div>
                    <div class="button-container">
                        <button onclick="handleYesClick()">Evet</button>
                        <button onclick="handleNoClick()">Hayır</button>
                    </div>
                </div>
            </div>
            <div class="heart"></div>
            <div class="hearts-container"></div>
        </div>
    </div>
    <script>
        const envelope = document.querySelector('.envelope-wrapper');
        const heartsContainer = document.querySelector('.hearts-container');
        const heart = document.querySelector('.heart'); // Kalp elementini seçiyoruz

        // Bu event listener zarfı AÇAR
        envelope.addEventListener('click', () => {
            // Eğer zarf zaten açıksa veya bir butona tıklandıysa, bir şey yapma
            if (envelope.classList.contains('flap') || event.target.tagName === 'BUTTON') {
                return;
            }
            envelope.classList.add('flap');

            // Kalplerin oluşma animasyonu
            if (envelope.classList.contains('flap')) {
                for (let i = 0; i < 15; i++) {
                    setTimeout(() => {
                        const floatingHeart = document.createElement('div');
                        floatingHeart.classList.add('floating-heart');
                        const randomLeft = 40 + (Math.random() * 20);
                        const randomDuration = 2 + (Math.random() * 2);
                        const randomDelay = Math.random() * 0.8;
                        floatingHeart.style.left = `${randomLeft}%`;
                        floatingHeart.style.animationDuration = `${randomDuration}s`;
                        floatingHeart.style.animationDelay = `${randomDelay}s`;
                        heartsContainer.appendChild(floatingHeart);
                        floatingHeart.addEventListener('animationend', () => {
                            floatingHeart.remove();
                        });
                    }, i * 120);
                }
            }
        });

        // Bu event listener sadece kalbe tıklandığında zarfı KAPATIR
        heart.addEventListener('click', (event) => {
            // Sadece zarf açıksa kapat
            if (envelope.classList.contains('flap')) {
                // Tıklamanın zarfın kendisine yayılmasını engelle (yeniden açılmasını önler)
                event.stopPropagation(); 
                envelope.classList.remove('flap');
                heartsContainer.innerHTML = ''; // Uçan kalpleri temizle
            }
        });

        function handleYesClick() {
            const mainText = document.getElementById('main-text');
            mainText.textContent = "Harika nikah dairesine geçebiliriz";
        }

        function handleNoClick() {
            alert("Bu seçenek geçersiz. Lütfen tekrar deneyin.");
        }
    </script>
</body>
</html>
