<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Envelope + Letter (Open/Close on Click)</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="letter">
                    <div class="text">
                        <h1 id="main-text">Merhaba çok tatlısınız. Tanışabilir miyiz?</h1>
                    </div>
                    <div class="button-container">
                        <button onclick="handleYesClick()">Evet</button>
                        <button onclick="handleNoClick()">Hayır</button>
                    </div>
                </div>
            </div>
            <div class="heart"></div>
            <div class="hearts-container"></div>
        </div>
    </div>
    <script>
        const envelope = document.querySelector('.envelope-wrapper');
        const heartsContainer = document.querySelector('.hearts-container');

        envelope.addEventListener('click', () => {
            // Don't toggle the flap if a button was clicked
            if (event.target.tagName === 'BUTTON') {
                return;
            }
            envelope.classList.toggle('flap');

            if (envelope.classList.contains('flap')) {
                for (let i = 0; i < 15; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.classList.add('floating-heart');
                        const randomLeft = 40 + (Math.random() * 20);
                        const randomDuration = 2 + (Math.random() * 2);
                        const randomDelay = Math.random() * 0.8;
                        heart.style.left = `${randomLeft}%`;
                        heart.style.animationDuration = `${randomDuration}s`;
                        heart.style.animationDelay = `${randomDelay}s`;
                        heartsContainer.appendChild(heart);
                        heart.addEventListener('animationend', () => {
                            heart.remove();
                        });
                    }, i * 120);
                }
            } else {
                heartsContainer.innerHTML = '';
            }
        });

        function handleYesClick() {
            const mainText = document.getElementById('main-text');
            mainText.textContent = "Harika nikah dairesine geçebiliriz";
        }

        function handleNoClick() {
            alert("Bu seçenek geçersiz. Lütfen tekrar deneyin.");
        }
    </script>
</body>
</html>
