<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Envelope + Letter (Open/Close on Click)</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="letter">
                    <div class="text">
                        <h1 id="main-text">Beni seviyor musun?</h1>
                    </div>
                    <div class="button-container">
                        <button onclick="handleYesClick(event)">Evet</button>
                        <button onclick="handleNoClick(event)">Hayır</button>
                    </div>
                </div>
            </div>
            <div class="heart"></div>
            <div class="hearts-container"></div>
        </div>
    </div>
<script>
    const envelope = document.querySelector('.envelope-wrapper');
    const heartsContainer = document.querySelector('.hearts-container');
    const heart = document.querySelector('.heart');
    const mainText = document.getElementById('main-text');

    const messages = [
        "Benimle gezmeyi seviyor musun?",
        "Sonsuza kadar yanımda kalır mısın?",
        "Merhaba Ayşegül, her ne kadar ayrı olsakta seni tüm kalbimle sevdiğimi bilmeni istiyorum. Sana olan sevgim ölçülemeyecek kadar ama bu birlikte olmamıza yetmiyor. Kime baksam seni görüyorum nereye gitsem seni istiyorum. Hayatımda kimseyi bu kadar sevmedim kimse için bu kadar çaba göstermedim senin yerin her zaman farklı olacak bugün de yarın da... Belki bir gün yine aynı oluruz ama belki de birbirimizi son görüşümüz olur o yüzden kendine hep iyi bak ve sana attığım linki hiç silme ne zaman değersiz hissedersen ne zaman sevilmediğini hiisedersen buraya gel ve seni her zaman seven birinin olduğunu hatırla :)" // bu son mesaj
    ];
    let currentMessageIndex = 0;

    envelope.addEventListener('click', (event) => {
        if (event.target.tagName === 'BUTTON' || envelope.classList.contains('flap')) {
            return;
        }
        envelope.classList.add('flap');
    });

    heart.addEventListener('click', (event) => {
        if (envelope.classList.contains('flap')) {
            event.stopPropagation();
            envelope.classList.remove('flap');
            heartsContainer.innerHTML = '';
        }
    });

  function handleYesClick(event) {
    event.stopPropagation();
    mainText.textContent = messages[currentMessageIndex];

    if (currentMessageIndex === messages.length - 1) {
        // Kalpleri uçur
        for (let i = 0; i < 15; i++) {
            setTimeout(() => {
                const floatingHeart = document.createElement('div');
                floatingHeart.classList.add('floating-heart');
                const randomLeft = 40 + (Math.random() * 20);
                const randomDuration = 2 + (Math.random() * 2);
                const randomDelay = Math.random() * 0.2;
                floatingHeart.style.left = `${randomLeft}%`;
                floatingHeart.style.animationDuration = `${randomDuration}s`;
                floatingHeart.style.animationDelay = `${randomDelay}s`;
                heartsContainer.appendChild(floatingHeart);
                floatingHeart.addEventListener('animationend', () => {
                    floatingHeart.remove();
                });
            }, i * 120);
        }

        // Butonları gizle
        document.querySelector(".button-container").style.display = "none";

        // Mektubu büyüt ve dışarı çıkar
        document.querySelector(".letter").classList.add("expand");
    }

    if (currentMessageIndex < messages.length - 1) {
        currentMessageIndex++;
    }
}

    function handleNoClick(event) {
        event.stopPropagation();
        alert("Hayır diyemezsin Ayşegül :)");
    }
</script>

</body>
</html>
